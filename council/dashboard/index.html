<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eternal Council</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
:root {
  --bg:      #0f0d0b;
  --bg2:     #161310;
  --bg3:     #1d1a16;
  --border:  #242018;
  --border2: #322e28;
  --text:    #ddd4c4;
  --text2:   #9a8878;
  --text3:   #5a5048;
  --amber:   #cc8820;
  --amber2:  #e0a840;
  --green:   #4a9060;
  --red:     #b04030;
  --red2:    #d87060;
  --blue:    #4878b0;
  --purple:  #7858a8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  line-height: 1.5;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ─── Layout shell ─── */
#app {
  display: grid;
  grid-template-rows: 40px 1fr 38px;
  height: 100vh;
  overflow: hidden;
}

/* ─── Top bar ─── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  gap: 12px;
}

#wordmark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--amber);
  text-transform: uppercase;
  white-space: nowrap;
}

#topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  min-width: 0;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.topbar-stat { color: var(--text2); }
.topbar-stat span { color: var(--amber2); }

.topbar-topic {
  font-family: 'IBM Plex Sans', sans-serif;
  font-style: italic;
  font-size: 10px;
  color: var(--text3);
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
}

/* ─── Main area ─── */
#main {
  display: grid;
  grid-template-columns: 290px 1fr;
  overflow: hidden;
  min-height: 0;
}

/* ─── Left panel — Dispatch ─── */
#dispatch {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
  min-height: 0;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px 7px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.panel-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--text3);
  text-transform: uppercase;
}

.panel-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
}

#feed {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
}

/* ─── Feed message ─── */
.feed-msg {
  padding: 7px 10px 7px 12px;
  border-bottom: 1px solid var(--border);
  border-left: 2px solid transparent;
  position: relative;
  cursor: default;
}

.feed-msg:hover {
  background: var(--bg2);
}

.feed-msg-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}

.feed-ts {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  color: var(--text3);
  flex-shrink: 0;
}

.feed-route {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  flex-shrink: 0;
}

.feed-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 3px;
  color: #fff;
  flex-shrink: 0;
  opacity: 0.85;
}

.feed-body {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8.5px;
  color: var(--text2);
  line-height: 1.45;
  word-break: break-word;
  overflow-wrap: break-word;
}

/* ─── Law codification event ─── */
.feed-law {
  border-left-color: var(--amber) !important;
  background: rgba(204,136,32,0.04);
}

.feed-law-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  color: var(--amber);
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}

.feed-law-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text);
  line-height: 1.5;
}

/* ─── Right panel — Canon ─── */
#canon-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* ─── Tab bar ─── */
.tab-bar {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  padding: 0 12px;
  flex-shrink: 0;
  gap: 0;
  height: 34px;
}

.tab {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  padding: 0 12px;
  height: 100%;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  white-space: nowrap;
}

.tab:hover { color: var(--text2); }
.tab.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

.tab-spacer { flex: 1; }

.search-wrap {
  display: flex;
  align-items: center;
}

#search-input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 3px;
  outline: none;
  width: 160px;
  transition: border-color 0.15s;
}

#search-input:focus { border-color: var(--amber); }
#search-input::placeholder { color: var(--text3); }

/* ─── Law list ─── */
.law-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
}

.law-entry {
  display: grid;
  grid-template-columns: 48px 1fr;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}

.law-entry:hover { background: var(--bg2); }

.law-entry.flash-new {
  animation: law-flash 0.9s ease-out;
}

@keyframes law-flash {
  0%   { background: rgba(204,136,32,0.18); }
  100% { background: transparent; }
}

.law-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  padding: 12px 0 12px 14px;
  line-height: 1;
  padding-top: 14px;
  user-select: none;
}

.law-content {
  padding: 11px 14px 11px 4px;
  min-width: 0;
}

.law-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 16px;
  color: var(--text);
  line-height: 1.45;
  margin-bottom: 5px;
}

.law-text.rejected-text {
  text-decoration: line-through;
  color: var(--red);
}

.law-mechanism {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  font-weight: 300;
  color: var(--text2);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
}

.law-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.conf-bar-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
}

.conf-bar {
  width: 48px;
  height: 2px;
  background: var(--border2);
  border-radius: 1px;
  overflow: hidden;
}

.conf-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.3s;
}

.conf-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
}

.topic-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  padding: 1px 6px;
  border-radius: 2px;
  background: var(--bg3);
  color: var(--text3);
  border: 1px solid var(--border2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}

.rejected-reason {
  font-family: 'IBM Plex Sans', sans-serif;
  font-style: italic;
  font-size: 10px;
  color: var(--red2);
  margin-top: 4px;
  line-height: 1.4;
}

/* ─── Void states ─── */
.void-state {
  padding: 48px 24px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  text-align: center;
  pointer-events: none;
  user-select: none;
}

/* ─── Agent bar (bottom) ─── */
#agentbar {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  height: 38px;
}

.agent-cell {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  border-right: 1px solid var(--border);
  padding: 0 8px;
  transition: background 0.2s;
}

.agent-cell:last-child { border-right: none; }
.agent-cell.agent-active { background: var(--bg3); }

.agent-pip {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.agent-active .agent-pip {
  animation: pip-pulse 1.2s ease-in-out infinite;
}

@keyframes pip-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.5); opacity: 0.7; }
}

.agent-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
}

.agent-active-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  color: var(--text2);
  opacity: 0;
  transition: opacity 0.2s;
}

.agent-active .agent-active-label { opacity: 1; }

/* ─── Detail panel ─── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,13,11,0.7);
  z-index: 100;
  transition: opacity 0.2s;
}

#detail-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 500px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border2);
  z-index: 101;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 11px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}

.detail-id {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 0.06em;
}

.rejected-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  padding: 2px 7px;
  border-radius: 3px;
  background: rgba(176,64,48,0.2);
  color: var(--red2);
  border: 1px solid var(--red);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.detail-date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  flex: 1;
  text-align: right;
}

.detail-close {
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  transition: color 0.15s;
  flex-shrink: 0;
}

.detail-close:hover { color: var(--text); }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  min-height: 0;
}

.detail-section {
  margin-bottom: 18px;
}

.detail-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.14em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.detail-law-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 20px;
  color: var(--text);
  line-height: 1.45;
}

.detail-mechanism {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--text2);
  line-height: 1.6;
}

.detail-prediction {
  font-family: 'Playfair Display', Georgia, serif;
  font-style: italic;
  font-size: 14px;
  color: var(--blue);
  line-height: 1.55;
}

.detail-conf {
  display: flex;
  align-items: center;
  gap: 10px;
}

.detail-conf-bar {
  flex: 1;
  height: 2px;
  background: var(--border2);
  border-radius: 1px;
  overflow: hidden;
}

.detail-conf-fill {
  height: 100%;
  border-radius: 1px;
}

.detail-conf-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  flex-shrink: 0;
}

.detail-evidence {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
}

.detail-evidence li {
  list-style: none;
  padding-left: 12px;
  position: relative;
  margin-bottom: 3px;
}

.detail-evidence li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--text3);
}

.analogue-block {
  border: 1px solid var(--border2);
  border-left: 2px solid var(--purple);
  padding: 8px 10px;
  margin-bottom: 8px;
  border-radius: 2px;
}

.analogue-era {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--purple);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.analogue-pattern {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
}

.analogue-echo {
  font-family: 'IBM Plex Sans', sans-serif;
  font-style: italic;
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
  line-height: 1.45;
}

.detail-signals {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  color: var(--text2);
  line-height: 1.55;
}

.detail-signals li {
  list-style: none;
  padding-left: 12px;
  position: relative;
  margin-bottom: 3px;
}

.detail-signals li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--text3);
}

.verity-ruling {
  border-left: 2px solid var(--red);
  padding: 8px 10px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-style: italic;
  font-size: 12px;
  color: var(--red2);
  line-height: 1.55;
}

.counterexample-list {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  color: var(--red2);
  line-height: 1.55;
}

.counterexample-list li {
  list-style: none;
  padding-left: 12px;
  position: relative;
  margin-bottom: 3px;
}

.counterexample-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--red);
}

.detail-session {
  display: flex;
  align-items: center;
  gap: 10px;
}

.detail-session-id {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  flex: 1;
}

.transcript-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  padding: 3px 9px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text2);
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: border-color 0.15s, color 0.15s;
}

.transcript-btn:hover {
  border-color: var(--amber);
  color: var(--amber);
}

/* ─── Transcript overlay ─── */
#transcript-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}

#transcript-overlay.open { transform: translateY(0); }

.transcript-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.transcript-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
}

.transcript-close {
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  transition: color 0.15s;
}

.transcript-close:hover { color: var(--text); }

.transcript-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  line-height: 1.7;
  color: var(--text3);
}

.transcript-line { margin-bottom: 2px; }
</style>
</head>
<body>
<div id="app" x-data="council()">

  <!-- ─── Top bar ─── -->
  <div id="topbar">
    <div id="wordmark">Eternal Council</div>
    <div id="topbar-right">
      <div class="live-dot"></div>
      <div class="topbar-stat"><span x-text="laws.length"></span> laws</div>
      <div class="topbar-stat"><span x-text="stats.session_count || 0"></span> sessions</div>
      <div class="topbar-stat" x-text="uptimeStr()"></div>
      <div class="topbar-topic" x-text="currentTopic ? '↳ ' + currentTopic : ''" x-show="currentTopic"></div>
    </div>
  </div>

  <!-- ─── Main area ─── -->
  <div id="main">

    <!-- ─── Left: Dispatch ─── -->
    <div id="dispatch">
      <div class="panel-header">
        <div class="panel-label">Dispatch</div>
        <div class="panel-count" x-text="messages.length + ' msgs'"></div>
      </div>
      <div id="feed">
        <template x-for="m in messages" :key="m.id">
          <div class="feed-msg"
               :class="m.isLaw ? 'feed-law' : ''"
               :style="m.isLaw ? '' : 'border-left-color: rgb(' + agentRgb(m.src) + ')'">

            <!-- Law codification event -->
            <template x-if="m.isLaw">
              <div>
                <div class="feed-law-label" x-text="'codified · ' + (m.lawId || '')"></div>
                <div class="feed-law-text" x-text="m.lawText"></div>
              </div>
            </template>

            <!-- Regular message -->
            <template x-if="!m.isLaw">
              <div>
                <div class="feed-msg-meta">
                  <span class="feed-ts" x-text="m.ts"></span>
                  <span class="feed-route"
                        :style="'color: rgb(' + agentRgb(m.src) + ')'"
                        x-text="m.src + ' → ' + m.dst"></span>
                  <span class="feed-badge"
                        :style="'background: rgba(' + typeRgb(m.type) + ',0.25); color: rgb(' + typeRgb(m.type) + ')'"
                        x-text="m.typeName"></span>
                </div>
                <div class="feed-body" x-text="m.body"></div>
              </div>
            </template>
          </div>
        </template>
        <div class="void-state" x-show="messages.length === 0">waiting for signals…</div>
      </div>
    </div>

    <!-- ─── Right: Canon ─── -->
    <div id="canon-panel">
      <!-- Tab bar -->
      <div class="tab-bar">
        <div class="tab" :class="tab === 'canon' ? 'active' : ''" @click="tab = 'canon'">
          Canon (<span x-text="laws.length"></span>)
        </div>
        <div class="tab" :class="tab === 'rejected' ? 'active' : ''" @click="tab = 'rejected'">
          Rejected (<span x-text="rejected.length"></span>)
        </div>
        <div class="tab-spacer"></div>
        <div class="search-wrap" x-show="tab === 'canon'">
          <input id="search-input" type="text" placeholder="search laws…"
                 x-model="searchQuery" autocomplete="off" spellcheck="false">
        </div>
      </div>

      <!-- Canon list -->
      <div class="law-list" x-show="tab === 'canon'">
        <template x-for="(law, i) in filteredLaws" :key="law.id">
          <div class="law-entry" :id="'law-' + law.id" @click="openDetail(law)">
            <div class="law-num" x-text="'#' + String(i+1).padStart(2,'0')"></div>
            <div class="law-content">
              <div class="law-text" x-text="law.law"></div>
              <div class="law-mechanism" x-text="law.mechanism" x-show="law.mechanism"></div>
              <div class="law-meta">
                <div class="conf-bar-wrap">
                  <div class="conf-bar">
                    <div class="conf-bar-fill"
                         :style="'width:' + Math.round((law.confidence||0)*100) + '%; background:' + confColor(law.confidence||0)"></div>
                  </div>
                  <div class="conf-num" x-text="Math.round((law.confidence||0)*100) + '%'"></div>
                </div>
                <template x-if="law.topic">
                  <span class="topic-tag" x-text="law.topic.length > 22 ? law.topic.slice(0,22) + '…' : law.topic"></span>
                </template>
              </div>
            </div>
          </div>
        </template>
        <div class="void-state" x-show="laws.length === 0" style="pointer-events:none">no laws codified yet</div>
        <div class="void-state" x-show="laws.length > 0 && filteredLaws.length === 0" style="pointer-events:none">no results</div>
      </div>

      <!-- Rejected list -->
      <div class="law-list" x-show="tab === 'rejected'">
        <template x-for="(law, i) in rejected" :key="law.rejected_id || law.id || i">
          <div class="law-entry" @click="openDetail(law, true)">
            <div class="law-num" x-text="'#' + String(i+1).padStart(2,'0')"></div>
            <div class="law-content">
              <div class="law-text rejected-text" x-text="law.law"></div>
              <div class="law-mechanism" x-text="law.mechanism" x-show="law.mechanism"></div>
              <div class="rejected-reason" x-text="law.verdict_reason" x-show="law.verdict_reason"></div>
              <div class="law-meta" style="margin-top:4px">
                <div class="conf-bar-wrap">
                  <div class="conf-bar">
                    <div class="conf-bar-fill"
                         :style="'width:' + Math.round((law.confidence||0)*100) + '%; background:' + confColor(law.confidence||0)"></div>
                  </div>
                  <div class="conf-num" x-text="Math.round((law.confidence||0)*100) + '%'"></div>
                </div>
                <template x-if="law.topic">
                  <span class="topic-tag" x-text="law.topic.length > 22 ? law.topic.slice(0,22) + '…' : law.topic"></span>
                </template>
              </div>
            </div>
          </div>
        </template>
        <div class="void-state" x-show="rejected.length === 0" style="pointer-events:none">no rejections yet</div>
      </div>
    </div>
  </div>

  <!-- ─── Agent bar ─── -->
  <div id="agentbar">
    <template x-for="ag in agents" :key="ag.name">
      <div class="agent-cell" :class="ag.active ? 'agent-active' : ''">
        <div class="agent-pip"
             :style="'background: rgb(' + agentRgb(ag.name) + '); box-shadow: ag.active ? \"0 0 6px rgb(\" + agentRgb(ag.name) + \")\" : \"none\"'">
        </div>
        <div class="agent-name" x-text="ag.name"></div>
        <div class="agent-active-label">active</div>
      </div>
    </template>
  </div>

  <!-- ─── Detail panel overlay ─── -->
  <div id="overlay"
       x-show="selectedLaw !== null"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click="closeDetail()"
       style="display:none">
  </div>

  <div id="detail-panel"
       :style="selectedLaw !== null ? 'transform:translateX(0)' : 'transform:translateX(100%)'"
       x-show="selectedLaw !== null"
       style="display:none; transform:translateX(100%)">

    <template x-if="selectedLaw !== null">
      <div style="display:contents">
        <div class="detail-header">
          <div class="detail-id" x-text="selectedLaw.id || selectedLaw.rejected_id || '—'"></div>
          <div class="rejected-badge" x-show="isRejected">rejected</div>
          <div class="detail-date"
               x-text="(selectedLaw.codified_at || selectedLaw.rejected_at || '').slice(0,10)">
          </div>
          <button class="detail-close" @click="closeDetail()">✕</button>
        </div>

        <div class="detail-body">

          <!-- Law -->
          <div class="detail-section">
            <div class="detail-label">Law</div>
            <div class="detail-law-text" x-text="selectedLaw.law"></div>
          </div>

          <!-- Mechanism -->
          <div class="detail-section" x-show="selectedLaw.mechanism">
            <div class="detail-label">Mechanism</div>
            <div class="detail-mechanism" x-text="selectedLaw.mechanism"></div>
          </div>

          <!-- Prediction -->
          <div class="detail-section" x-show="selectedLaw.prediction">
            <div class="detail-label">Prediction</div>
            <div class="detail-prediction" x-text="selectedLaw.prediction"></div>
          </div>

          <!-- Confidence -->
          <div class="detail-section">
            <div class="detail-label">Confidence</div>
            <div class="detail-conf">
              <div class="detail-conf-bar">
                <div class="detail-conf-fill"
                     :style="'width:' + Math.round((selectedLaw.confidence||0)*100) + '%; background:' + confColor(selectedLaw.confidence||0)">
                </div>
              </div>
              <div class="detail-conf-num" x-text="Math.round((selectedLaw.confidence||0)*100) + '%'"></div>
            </div>
          </div>

          <!-- Evidence -->
          <div class="detail-section" x-show="selectedLaw.evidence && selectedLaw.evidence.length">
            <div class="detail-label">Evidence</div>
            <ul class="detail-evidence">
              <template x-for="e in (selectedLaw.evidence || [])" :key="e">
                <li x-text="e"></li>
              </template>
            </ul>
          </div>

          <!-- Kronos: Historical Analogues -->
          <div class="detail-section" x-show="selectedLaw.analogues && selectedLaw.analogues.length">
            <div class="detail-label">Historical Analogues</div>
            <template x-for="a in (selectedLaw.analogues || [])" :key="a.era + a.domain">
              <div class="analogue-block">
                <div class="analogue-era" x-text="(a.era || '') + ' · ' + (a.domain || '')"></div>
                <div class="analogue-pattern" x-text="a.pattern"></div>
                <div class="analogue-echo" x-text="a.structural_echo" x-show="a.structural_echo"></div>
              </div>
            </template>
          </div>

          <!-- Herald: Signals -->
          <div class="detail-section" x-show="selectedLaw.signals && selectedLaw.signals.length">
            <div class="detail-label">Signals</div>
            <ul class="detail-signals">
              <template x-for="s in (selectedLaw.signals || [])" :key="s.title || s.signal">
                <li x-text="(s.title ? s.title + ': ' : '') + (s.signal || '')"></li>
              </template>
            </ul>
          </div>

          <!-- Verity's Ruling (rejected only) -->
          <div class="detail-section" x-show="isRejected && selectedLaw.verdict_reason">
            <div class="detail-label">Verity's Ruling</div>
            <div class="verity-ruling" x-text="selectedLaw.verdict_reason"></div>
          </div>

          <!-- Counterexamples (rejected only) -->
          <div class="detail-section" x-show="isRejected && selectedLaw.counterexamples && selectedLaw.counterexamples.length">
            <div class="detail-label">Counterexamples</div>
            <ul class="counterexample-list">
              <template x-for="c in (selectedLaw.counterexamples || [])" :key="c">
                <li x-text="c"></li>
              </template>
            </ul>
          </div>

          <!-- Session -->
          <div class="detail-section" x-show="selectedLaw.session">
            <div class="detail-label">Session</div>
            <div class="detail-session">
              <div class="detail-session-id" x-text="selectedLaw.session"></div>
              <button class="transcript-btn"
                      @click="openTranscript(selectedLaw.session)">transcript</button>
            </div>
          </div>

        </div>
      </div>
    </template>
  </div>

  <!-- ─── Transcript overlay ─── -->
  <div id="transcript-overlay" :class="transcriptOpen ? 'open' : ''">
    <div class="transcript-topbar">
      <div class="transcript-title" x-text="'Transcript · ' + (transcriptSessionId || '')"></div>
      <button class="transcript-close" @click="closeTranscript()">✕</button>
    </div>
    <div class="transcript-body" id="transcript-body">
      <template x-for="(line, i) in transcriptLines" :key="i">
        <div class="transcript-line"
             :style="'color:' + wireColor(line)"
             x-text="line"></div>
      </template>
      <div class="void-state" x-show="transcriptLines.length === 0">loading…</div>
    </div>
  </div>

</div><!-- #app -->

<script>
function council() {
  return {
    // ── State ────────────────────────────────────────────────
    messages:    [],
    laws:        [],
    rejected:    [],
    stats:       {},
    tab:         'canon',
    searchQuery: '',
    selectedLaw: null,
    isRejected:  false,
    currentTopic: '',
    msgId:       0,

    transcriptOpen:      false,
    transcriptSessionId: '',
    transcriptLines:     [],

    agents: [
      { name: 'herald', active: false },
      { name: 'kronos', active: false },
      { name: 'loom',   active: false },
      { name: 'verity', active: false },
      { name: 'codex',  active: false },
    ],

    _agentTimers: {},
    _es: null,

    // ── Computed ─────────────────────────────────────────────
    get filteredLaws() {
      if (!this.searchQuery.trim()) return this.laws;
      const q = this.searchQuery.toLowerCase();
      return this.laws.filter(l =>
        (l.law || '').toLowerCase().includes(q) ||
        (l.mechanism || '').toLowerCase().includes(q) ||
        (l.topic || '').toLowerCase().includes(q)
      );
    },

    // ── Init ─────────────────────────────────────────────────
    init() {
      this.loadInitialData();
      this.connectSSE();
    },

    async loadInitialData() {
      try {
        const [lawsRes, rejRes, statsRes] = await Promise.all([
          fetch('/api/laws'),
          fetch('/api/rejected'),
          fetch('/api/stats'),
        ]);
        this.laws     = (await lawsRes.json())   || [];
        this.rejected = (await rejRes.json())    || [];
        this.stats    = (await statsRes.json())  || {};
        if (this.stats.current_session) {
          this.currentTopic = this.stats.current_session.topic || '';
        }
      } catch(e) { console.warn('init load failed', e); }
    },

    connectSSE() {
      this._es = new EventSource('/api/stream');

      this._es.addEventListener('zipr', e => {
        const d = JSON.parse(e.data);
        this.handleWire(d.wire, d.ts);
      });

      this._es.addEventListener('law', e => {
        const law = JSON.parse(e.data);
        // prepend (newest first) but avoid duplicates
        if (!this.laws.find(l => l.id === law.id)) {
          this.laws.unshift(law);
          this.$nextTick(() => this.flashLaw(law.id));
        }
        this.pushLawFeedEvent(law);
      });

      this._es.addEventListener('rejected', e => {
        const law = JSON.parse(e.data);
        if (!this.rejected.find(r => r.rejected_id === law.rejected_id)) {
          this.rejected.unshift(law);
        }
      });

      this._es.addEventListener('stats', e => {
        this.stats = JSON.parse(e.data);
        if (this.stats.current_session) {
          this.currentTopic = this.stats.current_session.topic || '';
        } else {
          this.currentTopic = '';
        }
      });

      this._es.addEventListener('session', e => {
        const d = JSON.parse(e.data);
        if (d.type === 'start') this.currentTopic = d.topic || '';
        if (d.type === 'end')   this.currentTopic = '';
      });

      this._es.addEventListener('heartbeat', () => {});

      this._es.onerror = () => {
        setTimeout(() => this.connectSSE(), 5000);
      };
    },

    handleWire(wire, ts) {
      if (!wire) return;
      try {
        // ZIPR wire format: TYPE src→dst {json}
        // Parse: first token = type char, second = route, rest = body JSON
        const firstSpace = wire.indexOf(' ');
        if (firstSpace < 0) return;
        const typeChar = wire.slice(0, firstSpace).trim();
        const rest     = wire.slice(firstSpace + 1).trim();

        const arrowIdx = rest.indexOf(' ');
        let src = '', dst = '', bodyStr = rest;
        if (arrowIdx > 0) {
          const route = rest.slice(0, arrowIdx);
          bodyStr = rest.slice(arrowIdx + 1).trim();
          const parts = route.split('→');
          src = parts[0] || '';
          dst = parts[1] || '';
        }

        // Mark agents active
        [src, dst].forEach(ag => {
          if (ag && this.agents.find(a => a.name === ag)) {
            this.setAgentActive(ag);
          }
        });

        // Parse body for display
        let bodyDisplay = bodyStr;
        try {
          const bd = JSON.parse(bodyStr);
          bodyDisplay = this.summarizeBody(bd);
        } catch(_) {}

        const msg = {
          id:       ++this.msgId,
          ts:       this.tsStr(ts),
          src:      src,
          dst:      dst,
          type:     typeChar,
          typeName: this.typeName(typeChar),
          body:     bodyDisplay.slice(0, 120),
          isLaw:    false,
        };
        this.messages.unshift(msg);
        if (this.messages.length > 400) this.messages.splice(400);
      } catch(e) {}
    },

    pushLawFeedEvent(law) {
      const msg = {
        id:      ++this.msgId,
        ts:      this.tsStr(),
        src:     'codex',
        dst:     'canon',
        type:    'l',
        typeName: 'law',
        body:    '',
        isLaw:   true,
        lawId:   law.id,
        lawText: (law.law || '').slice(0, 200),
      };
      this.messages.unshift(msg);
      if (this.messages.length > 400) this.messages.splice(400);
    },

    flashLaw(id) {
      const el = document.getElementById('law-' + id);
      if (el) {
        el.classList.remove('flash-new');
        void el.offsetWidth; // reflow
        el.classList.add('flash-new');
      }
    },

    setAgentActive(name) {
      const ag = this.agents.find(a => a.name === name);
      if (!ag) return;
      ag.active = true;
      clearTimeout(this._agentTimers[name]);
      this._agentTimers[name] = setTimeout(() => { ag.active = false; }, 4000);
    },

    // ── Detail panel ─────────────────────────────────────────
    openDetail(law, rejected = false) {
      this.selectedLaw = law;
      this.isRejected  = rejected || !!law.rejected_id;
    },

    closeDetail() {
      this.selectedLaw = null;
      this.isRejected  = false;
    },

    // ── Transcript ────────────────────────────────────────────
    async openTranscript(sessionId) {
      this.transcriptSessionId = sessionId;
      this.transcriptLines     = [];
      this.transcriptOpen      = true;
      try {
        const res  = await fetch('/api/sessions/' + sessionId);
        const data = await res.json();
        this.transcriptLines = (data.wires || []);
      } catch(e) {
        this.transcriptLines = ['[error loading transcript]'];
      }
    },

    closeTranscript() {
      this.transcriptOpen = false;
    },

    // ── Helpers ───────────────────────────────────────────────
    agentRgb(name) {
      const map = {
        herald: '72,120,192',
        kronos: '120,80,180',
        loom:   '60,160,100',
        verity: '180,64,48',
        codex:  '200,136,30',
      };
      return map[name] || '90,80,70';
    },

    typeRgb(t) {
      const map = {
        s: '72,120,192',
        q: '120,80,180',
        r: '60,160,100',
        t: '200,136,30',
        b: '200,136,30',
        e: '180,64,48',
        a: '60,160,100',
        p: '100,90,80',
      };
      return map[t] || '90,80,70';
    },

    typeName(t) {
      const map = {
        s: 'signal', q: 'query', r: 'reply',
        t: 'task',   b: 'bcast', e: 'error',
        a: 'ack',    p: 'ping',
      };
      return map[t] || t || '?';
    },

    confColor(v) {
      if (v >= 0.75) return '#4a9060';
      if (v >= 0.55) return '#cc8820';
      return '#b04030';
    },

    wireColor(line) {
      if (!line) return '#5a5048';
      const lower = line.toLowerCase();
      if (lower.includes('herald'))  return 'rgba(72,120,192,0.7)';
      if (lower.includes('kronos'))  return 'rgba(120,80,180,0.7)';
      if (lower.includes('loom'))    return 'rgba(60,160,100,0.7)';
      if (lower.includes('verity'))  return 'rgba(180,64,48,0.7)';
      if (lower.includes('codex'))   return 'rgba(200,136,30,0.7)';
      return '#5a5048';
    },

    summarizeBody(body) {
      if (!body || typeof body !== 'object') return String(body || '');
      const keys = ['law', 'topic', 'signal', 'summary', 'verdict', 'deep_pattern'];
      for (const k of keys) {
        if (body[k] && typeof body[k] === 'string') return body[k];
      }
      return JSON.stringify(body).slice(0, 120);
    },

    tsStr(ts) {
      const d = ts ? new Date(ts * 1000) : new Date();
      return d.toTimeString().slice(0, 8);
    },

    uptimeStr() {
      const s = this.stats.uptime_seconds || 0;
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sc = s % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${sc}s`;
      return `${sc}s`;
    },
  };
}
</script>
</body>
</html>
